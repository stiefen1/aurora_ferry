scenario_generation:
  experiment_name: "aurora_ferry_test_scenario_batch"
  description: "Scenario sampling configuration based on odm_training.json"
  seed: 42
  number_of_scenarios: 6

  simulation:
    duration_sec: 800
    dt: 0.2

  guidance: 
    update_every_sec: 30
    lookahead_distance: 2000.0
    colregs: true
    good_seamanship: true
    abort_colregs_after_iter: 3
    max_course_rate: 0.5
    buffer_target_ships: 100.0
    trim_path: 600.0
    term_dist: 200.0
    dchi: 5.0
    du: 0.1
    delay: 5
    delay_type: 'symmetric'
    corridor_width: 80
    simplify_corridor: 1
    max_iter: 10
    move_p_0_allowed_after_iter: 0
    move_p_f_allowed_after_iter: 9
    smooth_radius: 200.0

  navigation:
    q_tt: [1, 1, 0.01, 0.0003]
    r_ais: [10, 10, 0.04, 0.00122]
    r_camera: [0.00008, 640000]

  control:
    path_to_weights: 'models/sac/2026_05_22_15_10_57'
    algorithm: 'sac'

  ais_data_paths:
    - "data/raw/2023_04_06.csv"
    - "data/raw/2023_04_15.csv"

  mmsi_to_exclude: [265041000]

  start: ["Helsingborg", "Helsingor"]

  operational_domain:
    ferry:
      target_speed:
        min: 6.5
        max: 7.5
        mean: 7.0
        std: 1
      mass: 2250000
      passengers:
        number:
          min: 10
          max: 1250
        mass:
          min: 63
          max: 93
          std: 5
          mean: 78
      cars:
        number:
          min: 0
          max: 240
        mass:
          min: 900
          max: 1500
          std: 100
          mean: 1200

    wind:
      angle:
        min: -3.14159
        max: 3.14159
        ornstein_uhlenbeck:
          attraction: 0.03
          amplitude: 0.05
      speed:
        min: 0.0
        max: 15.0
        ornstein_uhlenbeck:
          attraction: 0.03
          amplitude: 0.1
      info: "According to https://app.fcoo.dk/ifm-maps/denmark/, wind up to 15m/s in any direction"

    current:
      angle:
        min: -3.14159
        max: 3.14159
        ornstein_uhlenbeck:
          attraction: 0.01
          amplitude: 0.05
      speed:
        min: 0.0
        max: 1.0
        ornstein_uhlenbeck:
          attraction: 0.01
          amplitude: 0.1
      info: "According to https://app.fcoo.dk/ifm-maps/denmark/, current up to 2kn in both directions"

    illumination:
      min: 0.0
      max: 1.0

    visibility:
      min: 0.0
      max: 1.0

  sensors:
    states:
      noise_covariance:
        min:
          - 1e-3
          - 1e-3
          - 0.00035
          - 5e-3
          - 5e-3
          - 5e-3
          - 0.00314159
          - 0.00314159
          - 0.00314159
          - 0.00314159
        max:
          - 1e-2
          - 1e-2
          - 0.0035
          - 5e-2
          - 5e-2
          - 5e-2
          - 0.0314159
          - 0.0314159
          - 0.0314159
          - 0.0314159
    ais:
      enabled: True
      update_every_sec: 1
      noise_covariance:
        min:
          - 3.0
          - 3.0
          - 0.1
          - 0.005
        max:
          - 5.0
          - 5.0
          - 0.5
          - 0.015
        info: "measure states are N, E, SOG [kn], COG [rad]"
    camera:
      enabled: True
      update_every_sec: 1
      failure:
        prob: 0.0
        time: 
          min: 0
          max: 1
          mean: 0.3
          std: 0.1
      info: "probability of a camera blackout during an episode."

